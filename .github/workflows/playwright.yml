name: Playwright Tests
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - name: Checkout app under test
        run: |
          git clone --depth 1 https://github.com/testsmith-io/practice-software-testing.git app-under-test

      - name: Start app under test
        working-directory: app-under-test
        run: |
          echo "SPRINT=sprint5" > .env
          docker compose -f docker-compose.yml up -d --build

      - name: Wait for services and seed database
        working-directory: app-under-test
        run: |
          npx wait-on http://localhost:4200 http://localhost:8091
          docker compose exec -T laravel-api php artisan migrate:fresh --seed

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install chromium --with-deps

      - name: Run Playwright tests
        run: npx playwright test
        env:
          UI_BASE_URL: http://localhost:4200
          API_BASE_URL: http://localhost:8091
          CUSTOMER_EMAIL: ${{ vars.CUSTOMER_EMAIL }}
          CUSTOMER_PASSWORD: ${{ secrets.CUSTOMER_PASSWORD }}
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
